<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Preorder Collection</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f5f5f5;
    }

    /* NAV */
    nav {
      background: #111;
      padding: 15px 25px;
    }

    nav a {
      color: white;
      text-decoration: none;
      transition: 0.3s;
    }

    nav a:hover {
      color: #ff4d4d;
    }

    /* TITLE */
    h1 {
      text-align: center;
      margin: 25px 0;
      font-size: 32px;
    }

    /* GRID */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 25px;
      padding: 20px 40px 60px;
    }

    /* CARD */
    .card {
      background: white;
      border-radius: 15px;
      overflow: hidden;
      text-align: center;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-10px);
      box-shadow: 0 12px 30px rgba(0,0,0,0.2);
    }

    .card img {
      width: 100%;
      height: 260px;
      object-fit: cover;
    }

    .card h3 {
      margin: 12px 0 5px;
      font-size: 18px;
    }

    .price {
      color: #ff4d4d;
      font-weight: bold;
      font-size: 18px;
      margin-bottom: 10px;
    }

    /* BUTTON STYLE */
    .btn {
      display: inline-block;
      margin-bottom: 15px;
      padding: 10px 16px;
      background: #111;
      color: white;
      text-decoration: none;
      border-radius: 6px;
      transition: 0.3s;
    }

    .btn:hover {
      background: #ff4d4d;
    }

    /* BADGE */
    .badge {
      position: absolute;
      background: #ff4d4d;
      color: white;
      padding: 5px 10px;
      font-size: 12px;
      border-radius: 5px;
      top: 10px;
      left: 10px;
    }

    .img-box {
      position: relative;
    }
  </style>
</head>

<body>

<nav>
  <a href="index.html">⬅ Back Home</a>
</nav>

<h1>🔥 Preorder Collection</h1>

<div class="grid">

  <div class="card">
    <div class="img-box">
      <span class="badge">NEW</span>
      <img src="./pjacket.png">
    </div>
    <h3>Limited Jacket Drop</h3>
    <p class="price">₹1599</p>
    <a href="form.html" class="btn">Preorder</a>
  </div>

  <div class="card">
    <div class="img-box">
      <span class="badge">HOT</span>
      <img src="./streettshirt.png">
    </div>
    <h3>Streetwear Tee Drop</h3>
    <p class="price">₹799</p>
    <a href="form.html" class="btn">Preorder</a>
  </div>

  <div class="card">
    <div class="img-box">
      <span class="badge">TREND</span>
      <img src="./beigep.png">
    </div>
    <h3>Premium Denim Drop</h3>
    <p class="price">₹1299</p>
    <a href="form.html" class="btn">Preorder</a>
  </div>

  <div class="card">
    <div class="img-box">
      <span class="badge">NEW</span>
      <img src="./sweatshirt.png">
    </div>
    <h3>Winter Collection Drop</h3>
    <p class="price">₹1899</p>
    <a href="form.html" class="btn">Preorder</a>
  </div>

</div>

</body>
</html>
