<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - StyleHub</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f5f5;
    }

    nav {
      background: #111;
      color: white;
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin-left: 15px;
    }

    .container {
      padding: 60px 30px;
      text-align: center;
      background: white;
      margin: 40px;
      border-radius: 10px;
    }

    .info {
      margin-top: 20px;
      line-height: 1.8;
    }
  </style>
</head>

<body>

  <nav>
    <h2>StyleHub</h2>
    <div>
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
    </div>
  </nav>

  <div class="container">
  <h1>Contact Us</h1>

  <form action="#" method="post" style="max-width:500px; margin:auto;">
    
    <div style="margin-bottom:15px;">
      <input type="text" name="name" placeholder="Your Name" required
             style="width:100%; padding:10px;">
    </div>

    <div style="margin-bottom:15px;">
      <input type="email" name="email" placeholder="Your Email" required
             style="width:100%; padding:10px;">
    </div>

    <div style="margin-bottom:15px;">
      <input type="tel" name="phone" placeholder="Your Phone Number"
             style="width:100%; padding:10px;">
    </div>

    <div style="margin-bottom:15px;">
      <textarea name="message" rows="5"
                placeholder="Write your message..."
                required
                style="width:100%; padding:10px;"></textarea>
    </div>

    <button type="submit"
            style="background:#111; color:white; border:none;
                   padding:12px 25px; cursor:pointer;">
      Send Message
    </button>
  </form>

  <div class="info">
    <p>Email: support@stylehub.com</p>
    <p>Phone: +91 9876543210</p>

    <hr>
     <p>Location:</p>
    <iframe
      src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d80563.1416202294!2d75.77139490310637!3d26.826543377694993!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x396db5000d19afd5%3A0x19d873b0a61c0c38!2sStyle%20Hub!5e0!3m2!1sen!2sin!4v1781029444533!5m2!1sen!2sin"
      width="100%"
      height="350"
      style="border:0;"
      allowfullscreen=""
      loading="lazy">
    </iframe>
  </div>
</div>

</body>
</html>
