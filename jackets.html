<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Jackets Collection</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f5f5f5;
    }

    /* NAV */
    nav {
      background: #111;
      padding: 15px 25px;
    }

    nav a {
      color: white;
      text-decoration: none;
      transition: 0.3s;
    }

    nav a:hover {
      color: #ff4d4d;
    }

    /* TITLE */
    h1 {
      text-align: center;
      margin: 25px 0;
      font-size: 32px;
    }

    /* GRID */
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 25px;
      padding: 20px 40px 60px;
    }

    /* CARD */
    .card {
      background: white;
      border-radius: 15px;
      overflow: hidden;
      text-align: center;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      transition: 0.3s;
      position: relative;
    }

    .card:hover {
      transform: translateY(-10px);
      box-shadow: 0 12px 30px rgba(0,0,0,0.2);
    }

    .card img {
      width: 100%;
      height: 260px;
      object-fit: cover;
    }

    .card h3 {
      margin: 12px 0 5px;
      font-size: 18px;
    }

    .price {
      color: #ff4d4d;
      font-weight: bold;
      font-size: 18px;
      margin-bottom: 10px;
    }

    .btn {
      margin-bottom: 15px;
      padding: 10px 16px;
      border: none;
      background: #111;
      color: white;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background: #ff4d4d;
    }

    /* BADGE */
    .badge {
      position: absolute;
      top: 10px;
      left: 10px;
      background: #ff4d4d;
      color: white;
      padding: 5px 10px;
      font-size: 12px;
      border-radius: 5px;
    }

    /* RESPONSIVE */
    @media(max-width: 992px){
      .grid{
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media(max-width: 600px){
      .grid{
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

<nav>
  <a href="index.html">⬅ Back Home</a>
</nav>

<h1>🔥 Premium Jackets Collection</h1>

<div class="grid">

  <div class="card">
    <span class="badge">HOT</span>
    <img src="./leather.png">
    <h3>Leather Jacket</h3>
    <p class="price">₹1499</p>
    <button class="btn">Buy Now</button>
  </div>

  <div class="card">
    <span class="badge">NEW</span>
    <img src="./denim.png">
    <h3>Denim Jacket</h3>
    <p class="price">₹1299</p>
    <button class="btn">Buy Now</button>
  </div>

  <div class="card">
    <span class="badge">TREND</span>
    <img src="./winter hoodie jacket.png">
    <h3>Winter Hoodie Jacket</h3>
    <p class="price">₹1399</p>
    <button class="btn">Buy Now</button>
  </div>

  <!-- NEW JACKETS (5 more) -->

  <div class="card">
    <span class="badge">NEW</span>
    <img src="./Puffer Jacket.png">
    <h3>Puffer Jacket</h3>
    <p class="price">₹1599</p>
    <button class="btn">Buy Now</button>
  </div>

  <div class="card">
    <span class="badge">HOT</span>
    <img src="./Bomber Jacket.png">
    <h3>Bomber Jacket</h3>
    <p class="price">₹1499</p>
    <button class="btn">Buy Now</button>
  </div>

  <div class="card">
    <span class="badge">TREND</span>
    <img src="./Casual Zip Jacket.png">
    <h3>Casual Zip Jacket</h3>
    <p class="price">₹1199</p>
    <button class="btn">Buy Now</button>
  </div>

  <div class="card">
    <span class="badge">NEW</span>
    <img src="./Streetwear Jacket.png">
    <h3>Streetwear Jacket</h3>
    <p class="price">₹1399</p>
    <button class="btn">Buy Now</button>
  </div>

  <div class="card">
    <span class="badge">HOT</span>
    <img src="./Winter Padded Jacket.png">
    <h3>Winter Padded Jacket</h3>
    <p class="price">₹1699</p>
    <button class="btn">Buy Now</button>
  </div>

</div>

</body>
</html>
