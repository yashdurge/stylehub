<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Preorder Form</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      text-align: center;
      padding-top: 50px;
    }

    .box {
      background: white;
      width: 300px;
      margin: auto;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 8px 0;
    }

    button {
      width: 95%;
      padding: 10px;
      border: none;
      background: #111;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #ff4d4d;
    }

    a {
      display: block;
      margin-top: 15px;
      text-decoration: none;
      color: #111;
    }
  </style>
</head>

<body>

  <h2>Preorder Form</h2>

  <div class="box">
    <form action="#">

      <input type="text" placeholder="Your Name" required>
      <input type="text" placeholder="Product Name" required>
      <input type="text" placeholder="Size" required>
      <input type="text" placeholder="Phone Number" required>

      <button type="submit">Submit</button>
    </form>

    <a href="index.html">⬅ Back to Store</a>
  </div>

</body>
</html>
